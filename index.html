<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ranking LATGAB</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f6fa;
        margin: 0;
        padding: 10px;
      }

      h1 {
        text-align: center;
        color: #800000;
        font-size: 20px;
      }

      .refresh {
        display: block;
        margin: 10px auto;
        padding: 8px 15px;
        background: #800000;
        color: white;
        border: none;
        border-radius: 6px;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      /* Card */
      .box {
        background: white;
        border-radius: 10px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      .box h2 {
        background: #800000;
        color: white;
        margin: 0;
        padding: 10px;
        font-size: 16px;
        text-align: center;
      }

      /* TABEL */
      .table-wrapper {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 500px;
      }

      th,
      td {
        padding: 8px;
        font-size: 13px;
        text-align: center;
      }

      th {
        background: #f1f1f1;
      }

      td {
        border-bottom: 1px solid #eee;
      }

      /* TOP 3 */
      tr:nth-child(1) {
        background: #fff4cc;
        font-weight: bold;
      }
      tr:nth-child(2) {
        background: #f0f0f0;
        font-weight: bold;
      }
      tr:nth-child(3) {
        background: #fbe9d0;
        font-weight: bold;
      }

      .rank {
        color: #800000;
        font-weight: bold;
      }

      .nilai {
        font-weight: bold;
      }

      /* DESKTOP MODE */
      @media (min-width: 768px) {
        .container {
          flex-direction: row;
        }

        .box {
          width: 50%;
        }

        h1 {
          font-size: 26px;
        }
      }
    </style>
  </head>

  <body>
    <h1>Ranking Latihan Gabungan</h1>

    <button class="refresh" onclick="loadData()">Refresh</button>

    <div class="container">
      <div class="box">
        <h2>PUTRA</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Nama</th>
                <th>Samapta</th>
                <th>PBB</th>
                <th>Kepribadian</th>
                <th>Nilai</th>
              </tr>
            </thead>
            <tbody id="putra"></tbody>
          </table>
        </div>
      </div>

      <div class="box">
        <h2>PUTRI</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Nama</th>
                <th>Samapta</th>
                <th>PBB</th>
                <th>Kepribadian</th>
                <th>Nilai</th>
              </tr>
            </thead>
            <tbody id="putri"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const API_URL =
        "https://script.google.com/macros/s/AKfycbzKRj5cFkE5udMh01POHxjX9JhcFli2NpFgxPyqgtzMlCGGCbhH2cEH84Dkv1jI6fHhCA/exec";

      async function loadData() {
        let res = await fetch(API_URL);
        let data = await res.json();

        render("putra", data.putra);
        render("putri", data.putri);
      }

      function render(id, data) {
        let el = document.getElementById(id);
        el.innerHTML = "";

        data.forEach((d, i) => {
          el.innerHTML += `
      <tr>
        <td class="rank">${i + 1}</td>
        <td>${d.nama}</td>
        <td>${d.samapta.toFixed(1)}</td>
        <td>${d.pbb}</td>
        <td>${d.kepribadian}</td>
        <td class="nilai">${d.nilaiAkhir.toFixed(2)}</td>
      </tr>
    `;
        });
      }

      setInterval(loadData, 5000);
      loadData();
    </script>
  </body>
</html>

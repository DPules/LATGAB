<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Ranking Paskibraka</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f6fa;
        margin: 0;
        padding: 20px;
      }

      h1 {
        text-align: center;
        color: #800000;
        margin-bottom: 20px;
      }

      .container {
        display: flex;
        gap: 20px;
      }

      .box {
        flex: 1;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      .box h2 {
        background: #800000;
        color: white;
        padding: 12px;
        margin: 0;
        text-align: center;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #f1f1f1;
        padding: 10px;
        font-size: 14px;
      }

      td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid #eee;
      }

      /* TOP 3 */
      tr:nth-child(1) {
        background: #fff4cc;
        font-weight: bold;
      }
      tr:nth-child(2) {
        background: #f0f0f0;
        font-weight: bold;
      }
      tr:nth-child(3) {
        background: #fbe9d0;
        font-weight: bold;
      }

      .rank {
        font-weight: bold;
        color: #800000;
      }

      .nilai {
        font-weight: bold;
      }

      .refresh {
        display: block;
        margin: 0 auto 20px;
        padding: 10px 20px;
        background: #800000;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      .refresh:hover {
        background: #a00000;
      }
    </style>
  </head>

  <body>
    <h1>Ranking Latihan Gabungan</h1>

    <button class="refresh" onclick="loadData()">Refresh</button>

    <div class="container">
      <div class="box">
        <h2>PUTRA</h2>
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Nama</th>
              <th>Samapta</th>
              <th>PBB</th>
              <th>Kepribadian</th>
              <th>Nilai</th>
            </tr>
          </thead>
          <tbody id="putra"></tbody>
        </table>
      </div>

      <div class="box">
        <h2>PUTRI</h2>
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Nama</th>
              <th>Samapta</th>
              <th>PBB</th>
              <th>Kepribadian</th>
              <th>Nilai</th>
            </tr>
          </thead>
          <tbody id="putri"></tbody>
        </table>
      </div>
    </div>

    <script>
      const API_URL =
        "https://script.google.com/macros/s/AKfycbzKRj5cFkE5udMh01POHxjX9JhcFli2NpFgxPyqgtzMlCGGCbhH2cEH84Dkv1jI6fHhCA/exec";

      async function loadData() {
        let res = await fetch(API_URL);
        let data = await res.json();

        render("putra", data.putra);
        render("putri", data.putri);
      }

      function render(id, data) {
        let el = document.getElementById(id);
        el.innerHTML = "";

        data.forEach((d, i) => {
          el.innerHTML += `
      <tr>
        <td class="rank">${i + 1}</td>
        <td>${d.nama}</td>
        <td>${d.samapta.toFixed(1)}</td>
        <td>${d.pbb}</td>
        <td>${d.kepribadian}</td>
        <td class="nilai">${d.nilaiAkhir.toFixed(2)}</td>
      </tr>
    `;
        });
      }

      setInterval(loadData, 5000);
      loadData();
    </script>
  </body>
</html>
